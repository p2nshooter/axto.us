name: Debug login endpoint (temporary)

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test /api/auth/login with a bogus credential (checks the endpoint responds with JSON at all, no real secrets involved)
        run: |
          echo "--- bogus credential, portal=admin ---"
          curl -sS -o /tmp/resp1.txt -w "HTTP status: %{http_code}\n" -X POST https://axto.us/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"nobody@example.com","password":"wrong","portal":"admin"}'
          echo "body:"; cat /tmp/resp1.txt; echo

          echo "--- bogus credential, no portal ---"
          curl -sS -o /tmp/resp2.txt -w "HTTP status: %{http_code}\n" -X POST https://axto.us/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"nobody@example.com","password":"wrong"}'
          echo "body:"; cat /tmp/resp2.txt; echo
